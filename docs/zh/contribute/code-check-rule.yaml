  - 屏蔽规则编号: 23
    语言: Python
    告警来源:
    告警理由: 避免在类外或者子类中访问父类受保护成员
    屏蔽选项: 规范例外的场景
    屏蔽理由: 部分Python代码需要访问标准库或者第三方库中受保护接口以实现特定功能和性能优化
    备注: 优先使用公开接口, 仅在公开接口无法满足需求时, 才考虑访问受保护成员

  - 屏蔽规则编号: 24
    语言: Python
    告警来源: G.CLS.11
    告警理由: 避免在类外或者子类中访问父类受保护成员
    屏蔽选项: 误报
    屏蔽理由: |
      [xxx] 是当前类内部或者Package内部变量, 是明显的误报
    备注: 仅在告警误报场景使用

  - 屏蔽规则编号: 25
    语言: Python
    告警来源: G.FNM.03
    告警理由: 当参数个数比较多且有相关性时, 建议通过class/namedtuple/dataclass等具名形式进行封装
    屏蔽选项: 规范例外的场景
    屏蔽理由: |
      @pypto.frontend.jit修饰的函数是大融合算子的入口, 参数较多, 入参采用平铺方式,
      保留每个参数有助于现实具体的参数信息

  - 屏蔽规则编号: 26
    语言: Python
    告警来源: G.LOG.03
    告警理由: 使用日志记录工具实现日志功能
    屏蔽选项: 规范例外的场景
    屏蔽理由: Example代码是临时的一次性脚本或者代码片段, 使用print可以像用户直接展示必须的结果或者提示信息
    备注: 该规则不涉及tests, tests中过多的命令行输出打印影响测试效率

  - 屏蔽规则编号: 27
    语言: Python
    告警来源: G.EXP.03
    告警理由: 不应将lambda表达式赋值给变量, 应该使用常规函数
    屏蔽选项: 规范例外的场景
    屏蔽理由: 部分ut等测试代码, 在测试原生 Python 向 PIL 的翻译时，需要覆盖 lambda 表达式赋值场景，以验证其翻译与执行结果符合预期
    备注: 屏蔽范围限定为examples/tests相关代码

  - 屏蔽规则编号: 28
    语言: Python
    告警来源: G.TYP.07
    告警理由: 使用dict[key]获取value时需要注意保证key在有效的范围内
    屏蔽选项: 规范例外的场景
    屏蔽理由: 部分ut等测试代码, 在测试原生 Python 向 PIL 的翻译行为时，需要覆盖 dict[key] 取值场景，以验证其翻译与执行结果符合预期
    备注: 屏蔽范围限定为examples/tests相关代码

  - 屏蔽规则编号: 29
    语言: Python
    告警来源: G.EXP.04
    告警理由: 推导式和生成器表达式仅用于简单的逻辑表达
    屏蔽选项: 规范例外的场景
    屏蔽理由: 部分ut等测试代码, 在测试原生 Python 向 PIL 的翻译行为时，需要覆盖复杂推导式和生成器表达式场景，以验证其翻译与执行结果符合预期
    备注: 屏蔽范围限定为examples/tests相关代码

  - 屏蔽规则编号: 30
    语言: Python
    告警来源: G.ERR.05
    告警理由: 使用有明确业务属性的异常类型
    屏蔽选项: 规范例外的场景
    屏蔽理由: 部分ut等测试代码, 在测试原生 Python 向 PIL 的翻译行为时，需要覆盖未显式指定异常类型的抛出场景，以验证其翻译与执行结果符合预期
    备注: 屏蔽范围限定为examples/tests相关代码

  - 屏蔽规则编号: 31
    语言: Python
    告警来源: G.ERR.13
    告警理由: 捕获异常后避免直接重新抛出
    屏蔽选项: 规范例外的场景
    屏蔽理由: 部分ut等测试代码, 在测试原生 Python 向 PIL 的翻译行为时，需要覆盖捕获异常后直接重新抛出的场景，以验证其翻译与执行结果符合预期
    备注: 屏蔽范围限定为examples/tests相关代码

  - 屏蔽规则编号: 32
    语言: Python
    告警来源: G.FNM.03
    告警理由: 当参数个数比较多且有相关性时, 建议通过class/namedtuple/dataclass等具名形式进行封装
    屏蔽选项: 规范例外的场景
    屏蔽理由: |
      pypto operation 对外提供的基础算子接口，参数较多，入参采用平铺方式，
      遵循业界规范，同时有助于降低用户理解的复杂度

  - 屏蔽规则编号: 33
    语言: Python
    告警来源: G.NAM.04
    告警理由: 避免在无关的标识符或无关的概念之间重用名字, 避免因重名而导致的意外赋值和错误引用
    屏蔽选项: 规范例外的场景
    屏蔽理由: |
      在pypto、pypto_pro/language中定义的abs、min等相关接口通常需要通过module.abs、module.min等公开接口；不会产生因重名导致的意外赋值和错误引用
    备注: 屏蔽范围限定为pypto/pypto_pro对外公开接口
