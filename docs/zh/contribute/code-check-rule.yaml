    屏蔽理由: 部分example等测试代码为提升可读性, 保留部分字段定义, 测试函数体定义等重复代码提升测试效率
    备注: 屏蔽范围限定为examples/tests相关代码

  - 屏蔽规则编号: 22
    语言: Python
    告警来源: 重复代码[Python]
