    告警理由: 指针类型'*'跟随变量名或者函数名[C]
    屏蔽选项: 规范例外的场景
    屏蔽理由: \*和&符号跟随变量名或者函数名, 在没有变量的场景, 添加空余用于强调和后面的标点区分， 提高可读性

